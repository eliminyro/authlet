version: "2"

run:
  go: "1.23"
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - revive
    - gocritic
    - bodyclose
    - errorlint

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
    - goimports
